# Terminal settings
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Clipboard passthrough — "external" means tmux passes clipboard escape
# sequences to the terminal rather than storing them in its own buffer.
# Kept for compatibility; primary clipboard sharing uses tmux paste buffer.
set -g set-clipboard external
set -ag update-environment "SSH_TTY"

# Paste from tmux buffer (prefix + P).
# Emacs C-y (visual mode) copies to this buffer via `tmux load-buffer -`.
# Use C-a P in any pane to paste it (e.g. into OpenCode).
bind-key P paste-buffer

# Prefix key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set-option -g repeat-time 0
set-option -g focus-events on

# Key bindings
set-window-option -g mode-keys vi

# Reload configuration
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Open current directory
bind o run-shell "open #{pane_current_path}"
bind -r e kill-pane -a

# Split panes
bind \\ split-window -h
bind - split-window -v

# Copy mode
bind v copy-mode

# Select entire lines in copy mode
bind-key -T copy-mode-vi 'V' send-keys -X select-line

# Copy to tmux buffer in copy mode (also stores in tmux paste buffer)
bind-key -T copy-mode-vi 'C-y' send-keys -X copy-selection-and-cancel

# Smart pane switching with Vim awareness
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind-key 'h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key 'j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key 'k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key 'l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'h' send-keys -X cursor-left
bind-key -T copy-mode-vi 'j' send-keys -X cursor-down
bind-key -T copy-mode-vi 'k' send-keys -X cursor-up
bind-key -T copy-mode-vi 'l' send-keys -X cursor-right

# Basic settings
set-option -g status-justify "left"
set-window-option -g mode-keys vi
set-option -g history-limit 64096
set -sg escape-time 10

# Window naming to show basename of current directory
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Colors for black background terminal (grey and black theme)
set-option -g status-style bg=#292929,fg=#cccccc
set-window-option -g window-status-style fg=#5f5f5f,bg=#292929
set-window-option -g window-status-current-style fg=#ffffff,bg=#292929,bold

# Pane borders
set-option -g pane-border-style fg=colour235  # dark grey
set-option -g pane-active-border-style fg=colour245,bg=black  # light grey border

# Message text
set-option -g message-style bg=black,fg=colour245

# Pane number display
set-option -g display-panes-active-colour colour245
set-option -g display-panes-colour colour235

# Clock
set-window-option -g clock-mode-colour colour245

# Title bar
set -g set-titles on
set -g set-titles-string "#T"

# Status bar settings
set -g status-interval 5
set -g status-justify left
set -g status-left-length 10
set -g status-right-length 140

# Platform-specific
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"
